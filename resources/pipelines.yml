resources:
  pipelines:
    route_scenario_modeling_pipeline:
      name: route-scenario-modeling-medallion-${bundle.target}
      catalog: ${var.catalog}
      target: ${var.schema}
      root_path: ../pipelines
      libraries:
        - file:
            path: ../pipelines/bronze.sql
        - file:
            path: ../pipelines/silver.sql
        - file:
            path: ../pipelines/gold.sql
      serverless: true
      photon: true
      continuous: false
      development: true
      channel: current
      configuration:
        catalog: ${var.catalog}
        schema: ${var.schema}
        raw_volume: ${var.raw_volume}
        raw_path: /Volumes/${var.catalog}/${var.schema}/${var.raw_volume}
      permissions:
        - level: CAN_VIEW
          group_name: users
