bundle:
  name: route-scenario-modeling

include:
  - resources/*.yml

sync:
  include:
    - dist/**
  exclude:
    - node_modules/
    - .pytest_cache/
    - "**/__pycache__/"
    - src/
    - /package.json
    - /package-lock.json
    - /vite.config.ts
    - /tsconfig.json
    - /tsconfig.app.json
    - /tsconfig.node.json
    - /postcss.config.js
    - /tailwind.config.ts

variables:
  catalog:
    description: Unity Catalog catalog
    default: demos
  schema:
    description: Unity Catalog schema
    default: route_scenario_modeling
  raw_volume:
    description: Unity Catalog volume for generated raw data
    default: raw
  warehouse_name:
    description: Serverless SQL warehouse used by the app and jobs
    default: route-scenario-modeling-warehouse
  app_name:
    description: Databricks App name
    default: route-scenario-modeling
  route_scenario_modeling_job_name:
    description: Job that runs baseline reconstruction, scenarios, solver, comparison, and validation
    default: route-scenario-modeling-plan
  solver_model_name:
    description: Unity Catalog registered MLflow PyFunc model for the OR-Tools route solver
    default: demos.route_scenario_modeling.route_solver
  solver_model_alias:
    description: Alias used by the solve task when loading the route solver model
    default: champion
  route_solver_endpoint_name:
    description: Databricks Model Serving endpoint used for interactive route solves
    default: route-solver
  lakebase_project_id:
    description: Lakebase Autoscaling project for interactive scenario state
    default: route-scenario-modeling-lakebase
  lakebase_project_display_name:
    description: Human-readable Lakebase project name
    default: Route Scenario Modeling Lakebase
  lakebase_production_branch_id:
    description: Protected Lakebase branch that anchors durable application data
    default: production
  lakebase_app_branch_id:
    description: Non-expiring Lakebase branch bound to the interactive application
    default: dev
  lakebase_database_id:
    description: Lakebase database resource identifier for the interactive application
    default: route-scenario-modeling
  lakebase_postgres_database:
    description: PostgreSQL database name used by the Lakebase application resource
    default: route_scenario_modeling
  lakebase_database_owner_role_id:
    description: Existing Lakebase role that owns the dedicated application database
    default: josh-melton
  lakebase_endpoint_id:
    description: Read-write Lakebase endpoint used for OAuth database credentials
    default: primary
  lakebase_app_schema:
    description: App-owned PostgreSQL schema for interactive state
    default: route_scenario_modeling

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: DEFAULT
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      app_name: route-scenario-modeling-dev
      warehouse_name: route-scenario-modeling-warehouse-dev
      route_scenario_modeling_job_name: route-scenario-modeling-plan-dev
      route_solver_endpoint_name: route-solver-dev

  prod:
    mode: production
    workspace:
      profile: DEFAULT
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

resources:
  sql_warehouses:
    sql_warehouse:
      name: ${var.warehouse_name}
      cluster_size: Small
      enable_photon: true
      enable_serverless_compute: true
      # Auto-scale up to 5 clusters under concurrent load. The app fires a few
      # SQL statements in parallel on each page load; this gives the warehouse
      # room to multiplex without queueing.
      min_num_clusters: 1
      max_num_clusters: 5
      auto_stop_mins: 10
      warehouse_type: PRO

  schemas:
    route_scenario_modeling_schema:
      catalog_name: ${var.catalog}
      name: ${var.schema}

  volumes:
    raw:
      catalog_name: ${var.catalog}
      schema_name: ${var.schema}
      name: ${var.raw_volume}
      volume_type: MANAGED

  apps:
    route_scenario_modeling_app:
      name: ${var.app_name}
      description: Route scenario modeling for baseline reconstruction and what-if planning
      source_code_path: .
      config:
        env:
          - name: DATA_BACKEND
            value: lakebase
          - name: LAKEBASE_APP_SCHEMA
            value: ${var.lakebase_app_schema}
          - name: LAKEBASE_ENDPOINT
            value_from: lakebase
          - name: DATABRICKS_ROUTE_SOLVER_ENDPOINT
            value: ${var.route_solver_endpoint_name}
      resources:
        - name: lakebase
          postgres:
            branch: ${resources.postgres_branches.route_scenario_modeling_dev.id}
            database: ${resources.postgres_databases.route_scenario_modeling_app_database.id}
            permission: CAN_CONNECT_AND_CREATE
        - name: route_solver
          serving_endpoint:
            name: ${var.route_solver_endpoint_name}
            permission: CAN_QUERY
        - name: sql_warehouse
          sql_warehouse:
            id: ${resources.sql_warehouses.sql_warehouse.id}
            permission: CAN_USE
        - name: dim_depots_augmented
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.dim_depots_augmented
            permission: SELECT
        - name: dim_customers_augmented
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.dim_customers_augmented
            permission: SELECT
        - name: dim_fleet_assets
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.dim_fleet_assets
            permission: SELECT
        - name: fact_delivery_orders
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.fact_delivery_orders
            permission: SELECT
        - name: baseline_route_daily_summary
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.baseline_route_daily_summary
            permission: SELECT
        - name: scenario_kpis
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.scenario_kpis
            permission: SELECT
        - name: app_scenario_results
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.app_scenario_results
            permission: SELECT
        - name: scenario_definitions
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.scenario_definitions
            permission: MODIFY
        - name: scenario_parameters
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.scenario_parameters
            permission: MODIFY
        - name: scenario_customer_overrides
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.scenario_customer_overrides
            permission: MODIFY
        - name: scenario_fleet_overrides
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.scenario_fleet_overrides
            permission: MODIFY
        - name: scenario_depot_overrides
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.scenario_depot_overrides
            permission: MODIFY
        - name: scenario_frequency_overrides
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.scenario_frequency_overrides
            permission: MODIFY
        - name: scenario_cost_overrides
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.scenario_cost_overrides
            permission: MODIFY
        - name: cost_parameters
          uc_securable:
            securable_type: TABLE
            securable_full_name: ${var.catalog}.${var.schema}.cost_parameters
            permission: SELECT
